<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liquid Glass Login</title>
    <link rel="stylesheet" href="../src/liquid-glass.css" />
  </head>
  <body>
    <main class="demo-wrap">
      <section class="glass-form liquid-glass">
        <nav class="blob-nav nav-blob">
          <a class="active" href="#">Sign In</a>
          <a href="#">Register</a>
          <a href="#">Reset</a>
        </nav>

        <h1 class="glass-title">Welcome Back</h1>
        <p class="glass-subtitle">Sign in with your email and password.</p>

        <form class="glass-grid">
          <div>
            <label class="glass-label" for="email">Email</label>
            <input class="glass-input" id="email" type="email" placeholder="you@example.com" />
          </div>

          <div>
            <label class="glass-label" for="password">Password</label>
            <input class="glass-input" id="password" type="password" placeholder="••••••••" />
          </div>

          <div class="glass-row">
            <button class="glass-button" type="button">Sign In</button>
            <button class="glass-button secondary" type="button">Guest</button>
          </div>
        </form>
      </section>
    </main>
  </body>
  </html>
