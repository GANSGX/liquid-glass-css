<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liquid Glass Variants</title>
    <link rel="stylesheet" href="../src/liquid-glass.css" />
  </head>
  <body>
    <main class="demo-wrap">
      <section class="variants-wrap">
        <article class="glass-card liquid-glass">
          <h2 class="glass-title">Base Glass</h2>
          <p class="glass-subtitle">Neutral, reusable panel style.</p>
          <div class="glass-chip liquid-glass">.liquid-glass</div>
        </article>

        <article class="glass-card nav-blob">
          <h2 class="glass-title">Strong Glass</h2>
          <p class="glass-subtitle">Higher blur + saturation for nav/active UI.</p>
          <div class="glass-chip nav-blob">.nav-blob</div>
        </article>

        <article class="glass-card liquid-glass">
          <h2 class="glass-title">Reference Mock</h2>
          <p class="glass-subtitle">Author mock concept for real-world usage.</p>
          <a class="demo-link" href="https://test-motion-design.vercel.app/" target="_blank" rel="noreferrer">
            Open mock site
          </a>
        </article>
      </section>
    </main>
