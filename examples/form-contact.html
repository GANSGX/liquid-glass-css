<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liquid Glass Contact</title>
    <link rel="stylesheet" href="../css/liquid-glass.css" />
  </head>
  <body>
    <main class="demo-wrap">
      <section class="glass-form liquid-glass">
        <h1 class="glass-title">Contact Form</h1>
        <p class="glass-subtitle">Simple glass UI for quick inquiries.</p>

        <form class="glass-grid">
          <div>
            <label class="glass-label" for="name">Name</label>
            <input class="glass-input" id="name" type="text" placeholder="Your name" />
          </div>

          <div>
            <label class="glass-label" for="topic">Topic</label>
            <input class="glass-input" id="topic" type="text" placeholder="Project, support, collab..." />
          </div>

          <div>
            <label class="glass-label" for="message">Message</label>
            <textarea class="glass-textarea" id="message" placeholder="Write your message here..."></textarea>
          </div>

          <button class="glass-button" type="button">Send Message</button>
        </form>
      </section>
    </main>
  </body>
  </html>
